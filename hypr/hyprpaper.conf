# ~/.config/hypr/hyprpaper.conf

wallpaper {
    monitor = DP-1
    # path = ~/Pictures/wallpapers/Anime-Girl2.png
    path = ~/Pictures/wallpapers/Lofi-Cafe2.png
    fit_mode = fill
}

wallpaper {
    monitor = DP-2
    path = ~/Pictures/wallpapers/pexels-iamtausifhossain9321-1226302.jpg
    fit_mode = fill
}

