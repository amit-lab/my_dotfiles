# ~/.config/hypr/hyprpaper.conf

wallpaper {
    monitor = DP-1
    path = ~/Pictures/wallpapers/Fantasy-Mountain.png
    fit_mode = fill
}

wallpaper {
    monitor = DP-2
    path = ~/Pictures/wallpapers/Concept-Japanese house.png
    fit_mode = fill
}

# Preload wallpapers (you can list multiple)
# preload = ~/Pictures/wallpapers/Lake.png
# preload = ~/Pictures/wallpapers/Flower-3.png
# # preload = ~/Pictures/wallpapers/wall2.png
#
# # Set wallpapers per monitor (match monitor name with `hyprctl monitors`)
# wallpaper = DP-1,~/Pictures/wallpapers/Lofi - Anime Girl.jpeg
# wallpaper = DP-2,~/Pictures/wallpapers/Flower-3.png
# # wallpaper = HDMI-A-1,~/Pictures/wallpapers/wall2.png
#
# # Optionally enable image smoothing for scaling
# smoothing = true
#
# # Optionally center images instead of stretch
# # wallpaper_mode = center
#
